<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome Extension</title>
</head>
<body>
    <main>
        <input type="text" placeholder="Website URL" id="input-el" autofocus>
        <div class="action_btns">
            <button id="save_input-btn">Save Input</button>
            <button id="save_tab-btn">Save Tab</button>
            <button id="clear_inputs-btn">Clear Inputs</button>
        </div>
        <div class="web_link-list">
            <ul id="ul-el"></ul>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
